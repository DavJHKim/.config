# =========================
# BACKGROUND
# =========================
background {
    monitor =
    path = ~/.config/hypr/assets/space.jpg

    blur_size = 8
    blur_passes = 3

    noise = 0.02
    contrast = 1.1
    brightness = 0.9

    vibrancy = 0.2
    vibrancy_darkness = 0.2

    zindex = 0
    keep_aspect_ratio = true
}

# =========================
# GENERAL
# =========================
general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

# =========================
# DATE (small, subtle)
# =========================
label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %B"

    color = rgba(255, 255, 255, 0.75)
    font_size = 28
    font_family = Inter Medium

    position = 0, 220
    halign = center
    valign = center
}

# =========================
# TIME (BIG CLOCK)
# =========================
label {
    monitor =
    text = cmd[update:1000] date +"%H"

    color = rgba(255, 255, 255, 0.95)
    font_size = 140
    font_family = Inter Bold

    position = -40, 40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%M"

    color = rgba(200, 200, 210, 1.0)
    font_size = 140
    font_family = Inter Bold

    position = 40, -80
    halign = center
    valign = center
}

# =========================
# PASSWORD INPUT (glass pill)
# =========================
input-field {
    monitor =

    size = 320, 70

    outer_color = rgba(255, 255, 255, 0.08)
    inner_color = rgba(0, 0, 0, 0.25)
    outline_thickness = 2

    font_color = rgba(255, 255, 255, 0.9)
    font_family = Inter Medium

    rounding = 20

    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true

    fade_on_empty = false
    hide_input = false

    placeholder_text = Enter password

    position = 0, -260
    halign = center
    valign = center

    zindex = 2
}
