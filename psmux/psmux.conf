set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-sensible'
set -g @plugin 'psmux-plugins/psmux-theme-rosepine'
set -g @plugin 'psmux-plugins/psmux-resurrect'
set -g @plugin 'psmux-plugins/psmux-continuum'

# Choose variant (main/moon/dawn)
set -g @rosepine-variant 'main'

# Window numbering base (default is 1)
set -g base-index 1

# Save interval in minutes (default: 15, set to 0 to disable)
set -g @continuum-save-interval '15'

# Auto-restore when psmux server starts
set -g @continuum-restore 'on'

# Auto-start psmux on Windows login
set -g @continuum-boot 'on'

# Open windows in current directory
bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
set -s escape-time 0

# Scrollback history
set -g history-limit 5000

# Prediction dimming (disable for apps like Neovim)
set -g prediction-dimming off

# set vi-mode
set-window-option -g mode-keys vi
# Keybindings for copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

run '~/.psmux/plugins/ppm/ppm.ps1'
